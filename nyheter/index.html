<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyheter – SK6AG</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  :root{
    --navy:#0c2747;--navy-2:#103154;--navy-3:#0a2039;
    --cobalt:#1b56b0;--gold:#f2c200;--gold-soft:#f6d75a;
    --paper:#eef3f8;--muted:#8ea4bd;--line:rgba(242,194,0,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--navy);color:var(--paper);font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:0 28px}
  a{color:var(--gold-soft)}

  .topbar{position:sticky;top:0;z-index:50;background:rgba(10,32,57,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .topbar .inner{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;max-width:1080px;margin:0 auto;font-family:"Helvetica Neue",Arial,sans-serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase}
  .topbar .call-link{text-decoration:none;color:inherit}
  .topbar .call{color:var(--gold-soft);font-weight:600;display:flex;align-items:center;gap:12px}
  .topbar .call img{width:28px;height:28px}
  .topbar nav a{color:var(--muted);text-decoration:none;margin-left:22px;transition:color .2s}
  .topbar nav a:hover{color:var(--paper)}

  header.head{padding:60px 0 20px;border-bottom:1px solid var(--line)}
  .sec-label{font-family:"Helvetica Neue",Arial,sans-serif;font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:14px}
  .sec-label::before{content:"";width:34px;height:1px;background:var(--gold)}
  h1{font-size:clamp(2rem,4vw,2.9rem);font-weight:500;letter-spacing:-.01em;line-height:1.1;margin-bottom:14px}
  .lead{color:#c3d0dd;max-width:60ch}

  .arsblock{padding:34px 0;border-top:1px solid var(--line)}
  .arsblock:first-of-type{border-top:none}
  .arsrubrik{font-family:"Helvetica Neue",Arial,sans-serif;font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:18px}

  .nyhet{display:grid;grid-template-columns:120px 1fr;gap:26px;align-items:baseline;padding:20px 0;border-bottom:1px solid rgba(242,194,0,.1)}
  .nyhet:last-child{border-bottom:none}
  .nyhet .date{font-family:"Helvetica Neue",Arial,sans-serif;font-size:.74rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
  .nyhet h3{font-size:1.2rem;font-weight:500;margin-bottom:6px}
  .nyhet p{color:#c3d0dd;font-size:1rem;white-space:pre-wrap}
  @media(max-width:600px){.nyhet{grid-template-columns:1fr;gap:6px}}

  .anm{font-family:"Helvetica Neue",Arial,sans-serif;font-size:.9rem;color:var(--muted);padding:34px 0}

  footer{border-top:1px solid var(--line);margin-top:40px;padding:40px 0;font-family:"Helvetica Neue",Arial,sans-serif;font-size:.8rem;color:var(--muted)}
  footer a{margin-right:22px;text-decoration:none}
  @media(max-width:600px){.topbar nav{display:none}}
</style>
</head>
<body>
  <div class="topbar" id="top">
    <div class="inner">
      <a class="call-link" href="../index.html"><span class="call"><img src="../favicon.svg" alt="GSA">SK6AG · Göteborgs Sändareamatörer</span></a>
      <nav>
        <a href="../index.html#moten">Möten</a>
        <a href="../index.html#kommande">Kommande</a>
        <a href="../index.html#kontakt">Kontakt</a>
      </nav>
    </div>
  </div>

  <header class="head">
    <div class="wrap">
      <div class="sec-label">Nyheter</div>
      <h1>Från klubben</h1>
      <p class="lead">Nyheter, information och rapporter från Göteborgs Sändareamatörer.</p>
    </div>
  </header>

  <div class="wrap">
    <div id="nyhetsflode"><p class="anm">Laddar nyheter…</p></div>
  </div>

  <footer>
    <div class="wrap">
      <a href="../index.html">Till startsidan</a>
      <a href="../index.html#kommande">Kommande</a>
      <a href="../index.html#kontakt">Kontakt</a>
    </div>
  </footer>

  <script>
  (function(){
    var MAN = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function svDatum(d){
      if (!d) return '';
      var delar = d.slice(0,10).split('-');
      if (delar.length !== 3) return d;
      var man = MAN[parseInt(delar[1],10)-1] || '';
      return parseInt(delar[2],10) + ' ' + man + ' ' + delar[0];
    }

    fetch('/api/news')
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(data){
        var el = document.getElementById('nyhetsflode');
        var items = (data && data.nyheter) || [];
        if (!items.length){ el.innerHTML = '<p class="anm">Inga nyheter publicerade ännu.</p>'; return; }

        // Gruppera per år (nyast först), behåll API:ts sortering inom året.
        var arOrdning = [], grupper = {};
        items.forEach(function(n){
          var ar = (n.datum || '').slice(0,4) || 'Övrigt';
          if (!grupper[ar]){ grupper[ar] = []; arOrdning.push(ar); }
          grupper[ar].push(n);
        });
        arOrdning.sort(function(a,b){ return b.localeCompare(a); });

        el.innerHTML = arOrdning.map(function(ar){
          var nyheter = grupper[ar].map(function(n){
            return '<div class="nyhet">'+
              '<div class="date">'+esc(svDatum(n.datum))+'</div>'+
              '<div><h3>'+esc(n.rubrik)+'</h3><p>'+esc(n.text)+'</p></div>'+
              '</div>';
          }).join('');
          return '<section class="arsblock"><div class="arsrubrik">'+esc(ar)+'</div>'+nyheter+'</section>';
        }).join('');
      })
      .catch(function(){
        document.getElementById('nyhetsflode').innerHTML = '<p class="anm">Kunde inte ladda nyheterna just nu.</p>';
      });
  })();
  </script>

  <button id="till-topp" title="Till toppen" aria-label="Till toppen" style="position:fixed;right:24px;bottom:24px;width:46px;height:46px;border-radius:50%;background:var(--navy-2);border:1px solid var(--line);color:var(--gold-soft);cursor:pointer;font-size:1.3rem;line-height:1;display:none;align-items:center;justify-content:center;z-index:60;box-shadow:0 4px 14px rgba(0,0,0,.3)">↑</button>
  <script>
  (function(){var k=document.getElementById('till-topp');window.addEventListener('scroll',function(){k.style.display=window.pageYOffset>300?'flex':'none';});k.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
  </script>
</body>
</html>
